name: Repository Security

on:
  pull_request:
  push:
    branches:
      - '**'

permissions:
  {}

jobs:
  ossf-scorecard:
    name: OSSF Scorecard
    if: ${{ github.event_name != 'push' || github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard analysis
        uses: ossf/scorecard-action@ff5dd8929f96a8a4dc67d13f32b8c75057829621 # v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF to Security tab
        uses: github/codeql-action/upload-sarif@4d6150cc15f4cf6b68f0c4cff5ec0f020ad4bf5b # v3.28.14
        with:
          sarif_file: scorecard-results.sarif
