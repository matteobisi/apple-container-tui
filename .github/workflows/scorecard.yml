name: Repository Security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  {}

jobs:
  ossf-scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Node 24 compatible
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard analysis
        uses: ossf/scorecard-action@v2 # Node 24 compatible
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3 # Node 24 compatible
        with:
          sarif_file: scorecard-results.sarif
