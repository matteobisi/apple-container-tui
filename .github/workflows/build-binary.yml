name: Build Binary

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-actui:
    name: Build actui binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Node 24 compatible
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5 # Node 24 compatible
        with:
          go-version-file: go.mod

      - name: Build actui
        run: go build -o actui ./cmd/actui

      - name: Upload artifact
        uses: actions/upload-artifact@v4 # Node 24 compatible
        with:
          name: actui-linux-amd64
          path: actui
          if-no-files-found: error
          retention-days: 14