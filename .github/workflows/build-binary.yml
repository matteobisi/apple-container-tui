name: Build Binary

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-actui:
    name: Build actui binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2, Node 24 compatible
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0, Node 24 compatible
        with:
          go-version-file: go.mod

      - name: Build actui
        run: GOOS=darwin GOARCH=arm64 go build -o actui ./cmd/actui

      # T003 (US1): Generate SBOM from the repository source tree immediately after the binary
      # is compiled. Syft resolves the full Go module dependency graph from go.mod/go.sum
      # and writes an SPDX 2.3 JSON document. upload-artifact is disabled here so the
      # artifact name and retention policy are controlled explicitly in the next step.
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.15.0, composite action
        with:
          format: spdx-json
          output-file: actui-darwin-arm64.spdx.json
          upload-artifact: false

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2, Node 24 compatible
        with:
          name: actui-darwin-arm64
          path: actui
          if-no-files-found: error
          retention-days: 14

      # T004 (US2): Upload the SBOM as a separately named artifact so it is independently
      # downloadable from the workflow run and consumable by the release workflow.
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2, Node 24 compatible
        with:
          name: actui-darwin-arm64-sbom
          path: actui-darwin-arm64.spdx.json
          if-no-files-found: error
          retention-days: 14
