name: Publish Release

# Triggered by workflow_run on successful completion of "Build Binary".
# Downloads the actui-darwin-arm64 artifact from the triggering run,
# computes the next semantic version tag (patch increment from latest release,
# starting at v0.1.0), enforces idempotency, and publishes a GitHub Release.
#
# Actions used (all Node 24 compatible as of April 2026, pinned to commit SHA):
#   actions/checkout@11bd719...      (v4.2.2) — Node 24 compatible
#   actions/download-artifact@cc20338... (v4.1.9) — Node 24 compatible; supports cross-run download via run-id
#   gh (GitHub CLI)                  — pre-installed on ubuntu-latest, no Node.js runtime dependency
# SBOM: actui-darwin-arm64.spdx.json (SPDX 2.3 JSON generated by anchore/sbom-action) is downloaded
#   from the triggering build run and attached to the release for OSSF Scorecard SBOM check compliance.

on:
  workflow_run:
    workflows:
      - "Build Binary"
    types:
      - completed

permissions: {}

jobs:
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    # Skip entirely when the triggering build did not succeed
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read   # required to download artifacts from triggering workflow run
      contents: write # required to create releases and upload release assets
      id-token: write # required for OIDC-backed provenance attestation
      attestations: write # required to store attestation records in GitHub

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2, Node 24 compatible
        with:
          persist-credentials: false
          fetch-tags: true

      # T007: Download actui-darwin-arm64 from the triggering workflow run.
      # run-id targets the specific build run; github-token is required for cross-run access.
      - name: Download artifact actui-darwin-arm64
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9, Node 24 compatible; cross-run download via run-id
        with:
          name: actui-darwin-arm64
          path: release-assets/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # T005 (US2): Download the SBOM artifact produced by the triggering build run.
      # It is stored as a separate named artifact ('actui-darwin-arm64-sbom') so that it
      # can be independently traced and downloaded without extracting the binary artifact.
      - name: Download SBOM artifact actui-darwin-arm64-sbom
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9, Node 24 compatible; cross-run download via run-id
        with:
          name: actui-darwin-arm64-sbom
          path: release-assets/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # The artifact wraps a file named 'actui' (from go build -o actui).
      # Verify it arrived and rename to the release asset name for publication.
      - name: Verify and rename artifact
        run: |
          if [ ! -f "release-assets/actui" ]; then
            echo "::error::Artifact file 'actui' not found in release-assets/. Cannot publish release."
            ls -la release-assets/ || true
            exit 1
          fi
          mv release-assets/actui release-assets/actui-darwin-arm64
          chmod +x release-assets/actui-darwin-arm64
          echo "Artifact verified and renamed: $(ls -lh release-assets/actui-darwin-arm64)"

      # T006 (US2): Confirm the SBOM file arrived and is non-empty before attempting
      # to attach it to the release. jq validates that the file contains valid JSON.
      - name: Verify SBOM artifact
        run: |
          SBOM="release-assets/actui-darwin-arm64.spdx.json"
          if [ ! -f "$SBOM" ]; then
            echo "::error::SBOM file '${SBOM}' not found in release-assets/. Cannot publish release."
            ls -la release-assets/ || true
            exit 1
          fi
          if ! jq empty "$SBOM" 2>/dev/null; then
            echo "::error::SBOM file '${SBOM}' is not valid JSON."
            exit 1
          fi
          echo "SBOM verified: $(ls -lh $SBOM)"

      # T011 (US2): Compute the next patch version tag from existing releases.
      # Fallback to v0.1.0 when no prior automated release exists.
      - name: Compute next version tag
        id: compute-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Querying existing release tags..."
          LATEST_TAG=$(gh release list --limit 100 --json tagName --jq '.[].tagName' 2>/dev/null \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1 || true)

          if [ -z "$LATEST_TAG" ]; then
            NEXT_TAG="v0.1.0"
            echo "No prior automated release found. Starting at ${NEXT_TAG}."
          else
            MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
            NEXT_PATCH=$((PATCH + 1))
            NEXT_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
            echo "Latest release tag : ${LATEST_TAG}"
            echo "Next release tag   : ${NEXT_TAG}"
          fi

          echo "tag_name=${NEXT_TAG}" >> "$GITHUB_OUTPUT"

      # T008 + T013 (US1 + US2): Check for an existing release with the computed tag.
      # Skips publication without error to enforce idempotency on reruns.
      - name: Check for duplicate release
        id: idempotency-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.compute-version.outputs.tag_name }}"
          echo "Checking for existing release with tag '${TAG}'..."

          if gh release view "$TAG" &>/dev/null; then
            echo "::notice::Release '${TAG}' already exists. Skipping publication (idempotency enforced)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No existing release '${TAG}'. Proceeding with publication."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # T007 (US1 + US2): Create the GitHub Release and upload both the binary and the SBOM.
      # Attaching actui-darwin-arm64.spdx.json as a release asset satisfies the OSSF Scorecard
      # SBOM check (expects an SPDX/CycloneDX file attached to the latest release).
      # Uses the source commit SHA from the triggering build as the release target.
      - name: Publish release
        if: steps.idempotency-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_SHA: ${{ github.event.workflow_run.head_sha }}
          BUILD_RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          TAG="${{ steps.compute-version.outputs.tag_name }}"
          TITLE="Release ${TAG}"

          echo "Publishing release '${TAG}'..."
          echo "Source build : ${BUILD_RUN_URL}"
          echo "Source commit: ${BUILD_SHA}"

          gh release create "$TAG" \
            release-assets/actui-darwin-arm64 \
            release-assets/actui-darwin-arm64.spdx.json \
            --title "$TITLE" \
            --generate-notes \
            --target "$BUILD_SHA"

          RELEASE_URL=$(gh release view "$TAG" --json url --jq .url)
          echo "Release '${TAG}' published successfully."
          echo "Release URL  : ${RELEASE_URL}"
          echo "Assets       : actui-darwin-arm64, actui-darwin-arm64.spdx.json"

      # T004 (US2): Generate keyless SLSA provenance for both published release assets.
      # This step is gated by the same idempotency condition as release publication so
      # reruns that skip release creation also skip duplicate attestation attempts.
      - name: Attest build provenance
        if: steps.idempotency-check.outputs.skip != 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0, Node 24 compatible
        with:
          subject-path: |
            release-assets/actui-darwin-arm64
            release-assets/actui-darwin-arm64.spdx.json
